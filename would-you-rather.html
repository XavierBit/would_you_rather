<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Would You Rather</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1e242d;
    --border: rgba(255,255,255,0.09);
    --text: #e6edf3;
    --muted: #6e7681;
    --font: 'Outfit', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 50% at 15% 15%, rgba(63,185,80,0.055) 0%, transparent 60%),
      radial-gradient(ellipse 60% 45% at 85% 85%, rgba(88,166,255,0.055) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .screen { display: none; width: 100%; position: relative; z-index: 1; }
  .screen.active { display: flex; }

  /* ========== LOGO ========== */
  .logo-bar {
    position: absolute;
    top: 1.25rem;
    left: 1.5rem;
    z-index: 10;
  }
  .logo-bar img {
    height: 44px;
    width: auto;
    display: block;
  }


  /* Stats toggle */
  .stats-toggle-bar {
    width: 100%; max-width: 780px;
    display: flex; align-items: center; justify-content: flex-end;
    gap: 0.6rem; padding: 0.25rem 0 0.5rem;
  }
  .stats-toggle-label {
    font-size: 0.78rem; color: var(--muted); font-weight: 500; letter-spacing: 0.03em;
    user-select: none;
  }
  .toggle-switch {
    position: relative; width: 36px; height: 20px; cursor: pointer;
  }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .toggle-track {
    position: absolute; inset: 0; background: rgba(255,255,255,0.12);
    border-radius: 20px; transition: background 0.2s;
    border: 1px solid rgba(255,255,255,0.15);
  }
  .toggle-switch input:checked + .toggle-track { background: #3fb950; border-color: #3fb950; }
  .toggle-knob {
    position: absolute; top: 2px; left: 2px;
    width: 14px; height: 14px; background: #fff;
    border-radius: 50%; transition: transform 0.2s; pointer-events: none;
  }
  .toggle-switch input:checked ~ .toggle-knob { transform: translateX(16px); }

  /* ========== PICKER SCREEN ========== */
  #screen-pick {
    flex-direction: column;
    align-items: center;
    padding: 2.5rem 2rem 3rem;
    gap: 2rem;
    min-height: 100vh;
  }

  .pick-header { text-align: center; }
  .pick-eyebrow {
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.6rem;
  }
  .pick-header h1 {
    font-size: clamp(2.2rem, 5vw, 3.8rem);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -0.02em;
  }
  .pick-subtitle {
    margin-top: 0.6rem;
    color: var(--muted);
    font-size: 1rem;
    font-weight: 300;
  }

  .level-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    justify-content: center;
    max-width: 780px;
    width: 100%;
  }

  .level-card {
    flex: 1 1 130px;
    max-width: 160px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.4rem 1.2rem;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }
  .level-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at top left, color-mix(in srgb, var(--lc) 14%, transparent), transparent 70%);
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .level-card:hover { border-color: var(--lc); box-shadow: 0 0 24px rgba(0,0,0,0.35), 0 0 0 1px var(--lc); }
  .level-card:hover::before { opacity: 1; }

  .level-badge {
    font-size: 1.9rem;
    font-weight: 800;
    color: var(--lc);
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .level-name {
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .level-qcount {
    margin-top: 0.5rem;
    font-size: 0.72rem;
    color: var(--muted);
  }
  .level-qcount span { color: var(--lc); font-weight: 600; }
  .level-votes { font-size: 0.72rem; color: var(--muted); }
  .level-votes span { color: var(--lc); font-weight: 600; }

  .level-actions {
    margin-top: 0.8rem;
    display: flex;
    gap: 0.4rem;
    position: relative;
    z-index: 1;
  }
  .btn-play {
    flex: 1;
    padding: 0.45rem 0;
    background: var(--lc);
    border: none;
    border-radius: 8px;
    color: #0d1117;
    font-family: var(--font);
    font-size: 0.8rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s;
    letter-spacing: 0.03em;
  }
  .btn-play:hover { opacity: 0.85; }
  .btn-edit {
    padding: 0.45rem 0.6rem;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: var(--font);
    font-size: 0.8rem;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .btn-edit:hover { border-color: var(--lc); color: var(--lc); }

  /* ========== EDITOR PANEL ========== */
  #editor-panel {
    display: none;
    flex-direction: column;
    gap: 1rem;
    width: 100%;
    max-width: 780px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 1.75rem;
    animation: fadeUp 0.3s ease;
  }
  #editor-panel.open { display: flex; }

  .editor-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 0.75rem;
  }
  .editor-title {
    font-size: 1.1rem;
    font-weight: 700;
  }
  .editor-title span { color: var(--elc, #fff); }
  .editor-close {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: var(--font);
    font-size: 0.85rem;
    padding: 0.35rem 0.85rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .editor-close:hover { border-color: var(--text); color: var(--text); }

  .editor-list {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
    max-height: 380px;
    overflow-y: auto;
    padding-right: 0.25rem;
  }
  .editor-list::-webkit-scrollbar { width: 4px; }
  .editor-list::-webkit-scrollbar-track { background: transparent; }
  .editor-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .editor-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .editor-row-num {
    font-size: 0.75rem;
    color: var(--muted);
    width: 1.4rem;
    flex-shrink: 0;
    text-align: right;
  }
  .editor-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--font);
    font-size: 0.9rem;
    padding: 0.5rem 0.75rem;
    outline: none;
    transition: border-color 0.15s;
    min-width: 0;
  }
  .editor-input:focus { border-color: var(--elc, rgba(255,255,255,0.4)); }
  .editor-or {
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--muted);
    flex-shrink: 0;
    letter-spacing: 0.05em;
  }
  .btn-del-row {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    padding: 0.2rem 0.3rem;
    border-radius: 4px;
    transition: color 0.15s;
    flex-shrink: 0;
  }
  .btn-del-row:hover { color: #ff7b72; }

  .editor-footer {
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
    align-items: center;
  }
  .btn-add-q {
    background: transparent;
    border: 1px dashed var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: var(--font);
    font-size: 0.85rem;
    padding: 0.5rem 1.1rem;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .btn-add-q:hover { border-color: var(--elc, #fff); color: var(--elc, #fff); }
  .btn-save-q {
    background: var(--elc, #fff);
    border: none;
    border-radius: 8px;
    color: #0d1117;
    font-family: var(--font);
    font-size: 0.85rem;
    font-weight: 700;
    padding: 0.5rem 1.4rem;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn-save-q:hover { opacity: 0.85; }
  .btn-reset-q {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: var(--font);
    font-size: 0.85rem;
    padding: 0.5rem 1rem;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
    margin-left: auto;
  }
  .btn-reset-q:hover { border-color: #ff7b72; color: #ff7b72; }
  .btn-export-q {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: var(--font);
    font-size: 0.85rem;
    padding: 0.5rem 1rem;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .btn-export-q:hover { border-color: var(--elc, #fff); color: var(--elc, #fff); }
  .btn-import-q {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: var(--font);
    font-size: 0.85rem;
    padding: 0.5rem 1rem;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .btn-import-q:hover { border-color: var(--elc, #fff); color: var(--elc, #fff); }
  .editor-saved-msg {
    font-size: 0.85rem;
    color: var(--elc, #fff);
    opacity: 0;
    transition: opacity 0.3s;
    font-weight: 600;
  }
  .editor-saved-msg.show { opacity: 1; }

  /* ========== GAME SCREEN ========== */
  #screen-game {
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    gap: 1.75rem;
    min-height: 100vh;
    position: relative;
    background: linear-gradient(170deg, #2E3D83 0%, #1a2456 35%, #0a0d1a 100%);
    overflow: hidden;
  }

  /* Candy background bubbles */
  #screen-game::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 55% 35% at 10% 5%, rgba(120,140,255,0.22) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 90% 10%, rgba(200,100,255,0.12) 0%, transparent 55%),
      radial-gradient(ellipse 50% 40% at 80% 90%, rgba(80,200,255,0.1) 0%, transparent 55%),
      radial-gradient(ellipse 35% 25% at 5% 85%, rgba(100,80,255,0.14) 0%, transparent 55%);
    pointer-events: none;
    z-index: 0;
  }
  /* Sparkle dots */
  #screen-game::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle, rgba(255,255,255,0.55) 1px, transparent 1px),
      radial-gradient(circle, rgba(255,255,255,0.3) 1px, transparent 1px);
    background-size: 120px 120px, 60px 60px;
    background-position: 0 0, 30px 30px;
    pointer-events: none;
    z-index: 0;
    opacity: 0.18;
  }

  #screen-game > * { position: relative; z-index: 1; }

  .game-topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    max-width: 960px;
  }
  .back-btn {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.8);
    padding: 0.5rem 1.2rem;
    border-radius: 50px;
    cursor: pointer;
    font-family: var(--font);
    font-size: 0.95rem;
    font-weight: 500;
    transition: all 0.2s;
    backdrop-filter: blur(6px);
  }
  .back-btn:hover { background: rgba(255,255,255,0.2); color: #fff; }

  .game-level-badge {
    font-size: 1.1rem;
    font-weight: 800;
    color: rgba(255,255,255,0.9);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.18);
    padding: 0.35rem 1rem;
    border-radius: 50px;
    backdrop-filter: blur(6px);
  }
  .game-progress {
    font-size: 0.9rem;
    color: rgba(255,255,255,0.55);
    font-weight: 600;
    letter-spacing: 0.1em;
    min-width: 4rem;
    text-align: right;
  }

  /* BIG ALL-CAPS TITLE */
  .game-title {
    font-size: clamp(1.6rem, 4vw, 2.8rem);
    font-weight: 800;
    color: #fff;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    text-shadow:
      0 0 40px rgba(120,140,255,0.7),
      0 2px 8px rgba(0,0,0,0.5);
    line-height: 1.1;
  }

  .cards-wrap {
    display: flex;
    gap: 1.5rem;
    width: 100%;
    max-width: 960px;
    position: relative;
    align-items: stretch;
  }

  /* OR bubble */
  .or-pill {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    background: #fff;
    border: none;
    border-radius: 50%;
    width: 52px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    font-weight: 900;
    letter-spacing: 0.05em;
    color: #1a2456;
    text-transform: uppercase;
    pointer-events: none;
    z-index: 2;
    transition: opacity 0.3s, transform 0.3s;
    box-shadow:
      0 4px 16px rgba(0,0,0,0.35),
      0 0 0 4px rgba(255,255,255,0.2);
  }

  /* CANDY CARDS */
  .choice-card {
    flex: 1;
    border-radius: 28px;
    padding: 2.75rem 2rem;
    cursor: pointer;
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.25s ease, opacity 0.25s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.5rem;
    min-height: 300px;
    position: relative;
    text-align: center;
    overflow: hidden;
    border: 3px solid transparent;
  }

  /* Card A: warm coral-orange */
  #card-a {
    background: linear-gradient(145deg, #ff6b6b 0%, #ee5a24 50%, #c0392b 100%);
    box-shadow:
      0 8px 0 #9b1c1c,
      0 12px 30px rgba(238,90,36,0.45),
      inset 0 1px 0 rgba(255,255,255,0.3);
  }
  /* Card B: vivid purple-blue */
  #card-b {
    background: linear-gradient(145deg, #a29bfe 0%, #6c5ce7 50%, #4834d4 100%);
    box-shadow:
      0 8px 0 #2d1fa3,
      0 12px 30px rgba(108,92,231,0.45),
      inset 0 1px 0 rgba(255,255,255,0.3);
  }

  /* Glossy sheen */
  .choice-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 50%;
    background: linear-gradient(180deg, rgba(255,255,255,0.18) 0%, transparent 100%);
    border-radius: 25px 25px 50% 50%;
    pointer-events: none;
  }

  /* Letter badge */
  .choice-card::after {
    content: attr(data-letter);
    position: absolute;
    top: 1rem;
    left: 1.4rem;
    font-size: 1rem;
    font-weight: 900;
    color: rgba(255,255,255,0.35);
    transition: color 0.25s;
    letter-spacing: 0.05em;
  }

  .choice-card:not(.faded):hover {
    transform: translateY(-8px) scale(1.02);
  }
  #card-a:not(.faded):hover {
    box-shadow:
      0 16px 0 #9b1c1c,
      0 24px 40px rgba(238,90,36,0.55),
      inset 0 1px 0 rgba(255,255,255,0.3);
  }
  #card-b:not(.faded):hover {
    box-shadow:
      0 16px 0 #2d1fa3,
      0 24px 40px rgba(108,92,231,0.55),
      inset 0 1px 0 rgba(255,255,255,0.3);
  }

  .choice-card.chosen {
    transform: translateY(-6px) scale(1.03);
    cursor: default;
    border-color: rgba(255,255,255,0.6);
  }
  #card-a.chosen {
    box-shadow:
      0 14px 0 #9b1c1c,
      0 20px 50px rgba(238,90,36,0.65),
      inset 0 1px 0 rgba(255,255,255,0.3),
      0 0 0 4px rgba(255,255,255,0.25);
  }
  #card-b.chosen {
    box-shadow:
      0 14px 0 #2d1fa3,
      0 20px 50px rgba(108,92,231,0.65),
      inset 0 1px 0 rgba(255,255,255,0.3),
      0 0 0 4px rgba(255,255,255,0.25);
  }

  .choice-card.faded {
    opacity: 0.35;
    transform: scale(0.96) translateY(4px);
    cursor: default;
    filter: saturate(0.4);
  }

  .choice-text {
    font-size: clamp(1.3rem, 2.8vw, 1.85rem);
    font-weight: 700;
    line-height: 1.45;
    color: #fff;
    text-shadow: 0 1px 6px rgba(0,0,0,0.3);
    position: relative;
    z-index: 1;
  }

  .result-wrap {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.6rem;
    animation: fadeUp 0.45s ease forwards;
    position: relative;
    z-index: 1;
  }
  .result-pct {
    font-size: 3.5rem;
    font-weight: 800;
    color: #fff;
    line-height: 1;
    letter-spacing: -0.03em;
    text-shadow: 0 2px 12px rgba(0,0,0,0.3);
  }
  .result-bar-track {
    width: 100%;
    height: 8px;
    background: rgba(0,0,0,0.2);
    border-radius: 4px;
    overflow: hidden;
  }
  .result-bar-fill {
    height: 100%;
    border-radius: 4px;
    background: rgba(255,255,255,0.85);
    transition: width 0.9s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .result-count {
    font-size: 0.9rem;
    color: rgba(255,255,255,0.75);
    font-weight: 500;
  }

  .game-footer {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.8rem;
    animation: fadeUp 0.5s ease forwards;
  }
  .total-votes {
    font-size: 0.85rem;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 500;
  }
  .next-btn {
    background: #fff;
    border: none;
    color: #1a2456;
    padding: 0.9rem 3rem;
    border-radius: 50px;
    cursor: pointer;
    font-family: var(--font);
    font-size: 1rem;
    font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: all 0.2s ease;
    box-shadow: 0 4px 0 #b0b8d4, 0 8px 24px rgba(0,0,0,0.3);
  }
  .next-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 0 #b0b8d4, 0 12px 30px rgba(0,0,0,0.35);
  }
  .next-btn:active {
    transform: translateY(2px);
    box-shadow: 0 2px 0 #b0b8d4, 0 4px 16px rgba(0,0,0,0.25);
  }

  .slide-out { animation: slideOut 0.32s ease forwards; }
  .slide-in  { animation: slideIn  0.32s ease forwards; }

  @keyframes slideOut { to { opacity: 0; transform: translateX(-36px); } }
  @keyframes slideIn  { from { opacity: 0; transform: translateX(36px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes fadeUp   { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .btn-batch-q {
    background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.18);
    color: rgba(255,255,255,0.75); padding: 0.4rem 0.9rem; border-radius: 6px;
    cursor: pointer; font-family: var(--font); font-size: 0.82rem; font-weight: 600;
    transition: all 0.15s;
  }
  .btn-batch-q:hover { background: rgba(255,255,255,0.14); color: #fff; }
  /* Batch import modal */
  .batch-modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000;
    display: flex; align-items: center; justify-content: center;
  }
  .batch-modal {
    background: #1a1f35; border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px; padding: 1.5rem; width: 540px; max-width: 94vw;
    display: flex; flex-direction: column; gap: 1rem;
  }
  .batch-modal h3 { margin: 0; font-size: 1rem; font-weight: 700; color: #fff; }
  .batch-modal p { margin: 0; font-size: 0.8rem; color: var(--muted); line-height: 1.5; }
  .batch-modal textarea {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px; color: #fff; font-family: var(--font); font-size: 0.85rem;
    padding: 0.75rem; resize: vertical; min-height: 180px;
    outline: none; transition: border 0.15s;
  }
  .batch-modal textarea:focus { border-color: rgba(255,255,255,0.35); }
  .batch-modal-actions { display: flex; gap: 0.75rem; justify-content: flex-end; }
  .btn-batch-cancel {
    background: transparent; border: 1px solid rgba(255,255,255,0.18);
    color: rgba(255,255,255,0.6); padding: 0.45rem 1rem; border-radius: 6px;
    cursor: pointer; font-family: var(--font); font-size: 0.85rem; font-weight: 600;
  }
  .btn-batch-cancel:hover { color: #fff; border-color: rgba(255,255,255,0.4); }
  .btn-batch-apply {
    background: #3fb950; border: none; color: #000;
    padding: 0.45rem 1.1rem; border-radius: 6px;
    cursor: pointer; font-family: var(--font); font-size: 0.85rem; font-weight: 700;
  }
  .btn-batch-apply:hover { background: #56d96a; }

</style>

const CUSTOM_KEY = 'wyr_custom_questions_v1';

let currentLevel = null;
let currentIndex = 0;
let voted = false;
let openEditorLevel = null;
let showStats = localStorage.getItem('wyr_show_stats') !== 'false';

function getCustomQuestions() {
  try { return JSON.parse(localStorage.getItem(CUSTOM_KEY)) || {}; } catch { return {}; }
}
function saveCustomQuestions(data) { localStorage.setItem(CUSTOM_KEY, JSON.stringify(data)); }
function getQuestionsForLevel(code) {
  const custom = getCustomQuestions();
  return (custom[code] && custom[code].length) ? custom[code] : DEFAULT_LEVELS[code].questions;
}

function storageKey(level) { return `wyr_votes_${level}`; }
function indexKey(level)   { return `wyr_index_${level}`; }
function getVotes(level) {
  try { return JSON.parse(localStorage.getItem(storageKey(level))) || {}; } catch { return {}; }
}
function saveVotes(level, votes) { localStorage.setItem(storageKey(level), JSON.stringify(votes)); }
function getIndex(level) {
  const v = parseInt(localStorage.getItem(indexKey(level)), 10);
  return isNaN(v) ? 0 : v % getQuestionsForLevel(level).length;
}
function saveIndex(level, idx) { localStorage.setItem(indexKey(level), String(idx)); }
function totalVotesForLevel(level) {
  const votes = getVotes(level);
  return Object.values(votes).reduce((s, q) => s + (q.a || 0) + (q.b || 0), 0);
}

function buildPicker() {
  const grid = document.getElementById('level-grid');
  grid.innerHTML = '';
  Object.entries(DEFAULT_LEVELS).forEach(([code, data]) => {
    const total = totalVotesForLevel(code);
    const qs = getQuestionsForLevel(code);
    const card = document.createElement('div');
    card.className = 'level-card';
    card.dataset.level = code;
    card.style.setProperty('--lc', LEVEL_COLORS[code]);
    card.innerHTML = `
      <div class="level-badge">${code}</div>
      <div class="level-name">${data.name}</div>
      <div class="level-qcount"><span>${qs.length}</span> questions</div>
      <div class="level-votes">Votes: <span>${total}</span></div>
      <div class="level-actions">
        <button class="btn-play" onclick="event.stopPropagation(); startLevel('${code}')">Play</button>
        <button class="btn-edit" onclick="event.stopPropagation(); openEditor('${code}')">Edit</button>
      </div>
    `;
    grid.appendChild(card);
  });
  if (openEditorLevel) openEditor(openEditorLevel, true);
  initStatsToggle();
}

function openEditor(code, keepOpen) {
  openEditorLevel = code;
  const panel = document.getElementById('editor-panel');
  const color = LEVEL_COLORS[code];
  const qs = getQuestionsForLevel(code);
  panel.style.setProperty('--elc', color);
  panel.className = 'open';
  panel.innerHTML = `
    <div class="editor-header">
      <div class="editor-title">Editing: <span>${code} &middot; ${DEFAULT_LEVELS[code].name}</span></div>
      <button class="editor-close" onclick="closeEditor()">Close</button>
    </div>
    <div class="editor-list" id="editor-list"></div>
    <div class="editor-footer">
      <button class="btn-add-q" onclick="addEditorRow()">+ Add question</button>
      <button class="btn-save-q" onclick="saveEditor('${code}')">Save</button>
      <span class="editor-saved-msg" id="saved-msg">Saved!</span>
      <button class="btn-export-q" onclick="exportQuestions('${code}')">Export</button>
      <label class="btn-import-q">Import <input type="file" accept=".json" style="display:none" onchange="importQuestions(event,'${code}')"></label>
      <button class="btn-batch-q" onclick="openBatchImport('${code}')">Batch import</button>
      <button class="btn-reset-q" onclick="resetEditor('${code}')">Reset to defaults</button>
    </div>
  `;
  renderEditorRows(qs);
  if (!keepOpen) panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function renderEditorRows(qs) {
  const list = document.getElementById('editor-list');
  list.innerHTML = '';
  qs.forEach((q, i) => {
    list.appendChild(makeEditorRow(q.a, q.b, i));
  });
}

function makeEditorRow(valA, valB, i) {
  const row = document.createElement('div');
  row.className = 'editor-row';
  row.dataset.index = i;
  row.innerHTML = `
    <span class="editor-row-num">${i + 1}</span>
    <input class="editor-input" data-side="a" value="${escHtml(valA)}" placeholder="Option A">
    <span class="editor-or">or</span>
    <input class="editor-input" data-side="b" value="${escHtml(valB)}" placeholder="Option B">
    <button class="btn-del-row" title="Delete this question" onclick="deleteEditorRow(this)">&#x2715;</button>
  `;
  return row;
}

function addEditorRow() {
  const list = document.getElementById('editor-list');
  const i = list.querySelectorAll('.editor-row').length;
  const row = makeEditorRow('', '', i);
  list.appendChild(row);
  renumberRows();
  row.querySelector('input').focus();
  list.scrollTop = list.scrollHeight;
}

function deleteEditorRow(btn) {
  const list = document.getElementById('editor-list');
  if (list.querySelectorAll('.editor-row').length <= 1) return;
  btn.closest('.editor-row').remove();
  renumberRows();
}

function renumberRows() {
  document.querySelectorAll('#editor-list .editor-row').forEach((r, i) => {
    r.dataset.index = i;
    r.querySelector('.editor-row-num').textContent = i + 1;
  });
}

function collectEditorRows() {
  const qs = [];
  document.querySelectorAll('#editor-list .editor-row').forEach(row => {
    const a = row.querySelector('[data-side="a"]').value.trim();
    const b = row.querySelector('[data-side="b"]').value.trim();
    if (a || b) qs.push({ a: a || '...', b: b || '...' });
  });
  return qs;
}

function saveEditor(code) {
  const qs = collectEditorRows();
  if (!qs.length) return;
  const custom = getCustomQuestions();
  custom[code] = qs;
  saveCustomQuestions(custom);
  localStorage.removeItem(indexKey(code));
  buildPicker();
  const msg = document.getElementById('saved-msg');
  if (msg) { msg.classList.add('show'); setTimeout(() => msg.classList.remove('show'), 2200); }
}

function resetEditor(code) {
  if (!confirm('Reset all questions for ' + code + ' to the defaults? Your edits will be lost.')) return;
  const custom = getCustomQuestions();
  delete custom[code];
  saveCustomQuestions(custom);
  localStorage.removeItem(indexKey(code));
  openEditorLevel = code;
  buildPicker();
}

function exportQuestions(code) {
  const qs = getQuestionsForLevel(code);
  const data = { level: code, name: DEFAULT_LEVELS[code].name, questions: qs };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'wyr-questions-' + code.toLowerCase() + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importQuestions(event, code) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      const qs = data.questions || data;
      if (!Array.isArray(qs) || !qs.length) { alert('No valid questions found in file.'); return; }
      const valid = qs.filter(q => q.a && q.b);
      if (!valid.length) { alert('Questions must have an "a" and "b" field.'); return; }
      renderEditorRows(valid);
      const msg = document.getElementById('saved-msg');
      if (msg) {
        msg.textContent = valid.length + ' questions imported!';
        msg.classList.add('show');
        setTimeout(() => { msg.classList.remove('show'); msg.textContent = 'Saved!'; }, 2500);
      }
    } catch(err) { alert('Could not read file. Make sure it is a valid JSON export.'); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function closeEditor() {
  openEditorLevel = null;
  const panel = document.getElementById('editor-panel');
  panel.className = '';
  panel.innerHTML = '';
}


function toggleStats(on) {
  showStats = on;
  localStorage.setItem('wyr_show_stats', on ? 'true' : 'false');
}

function initStatsToggle() {
  const cb = document.getElementById('stats-toggle-cb');
  if (cb) cb.checked = showStats;
}

function openBatchImport(code) {
  const overlay = document.createElement('div');
  overlay.className = 'batch-modal-overlay';
  overlay.id = 'batch-overlay';
  overlay.innerHTML = `
    <div class="batch-modal">
      <h3>Batch Import Questions for ${code}</h3>
      <p>
        Paste one question pair per line, separated by a pipe <strong>|</strong>:<br>
        <em>Have breakfast in bed every day | Never eat breakfast again</em><br><br>
        Or drop / paste a <strong>.json</strong> file exported from this app.<br>
        These questions will be added to (not replace) the current list in the editor.
      </p>
      <textarea id="batch-textarea" placeholder="Have breakfast in bed every day | Never eat breakfast again&#10;Only speak in questions | Only speak in rhymes&#10;..."></textarea>
      <div class="batch-modal-actions">
        <button class="btn-batch-cancel" onclick="closeBatchImport()">Cancel</button>
        <button class="btn-batch-apply" onclick="applyBatchImport('${code}')">Add to editor</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', function(e){ if(e.target === overlay) closeBatchImport(); });
  setTimeout(() => document.getElementById('batch-textarea').focus(), 50);
}

function closeBatchImport() {
  const el = document.getElementById('batch-overlay');
  if (el) el.remove();
}

function applyBatchImport(code) {
  const raw = document.getElementById('batch-textarea').value.trim();
  if (!raw) { closeBatchImport(); return; }
  const qs = [];
  raw.split('\n').forEach(line => {
    const trimmed = line.trim();
    if (!trimmed) return;
    const parts = trimmed.split('|');
    if (parts.length >= 2) {
      const a = parts[0].trim();
      const b = parts.slice(1).join('|').trim();
      if (a && b) qs.push({ a, b });
    }
  });
  if (!qs.length) { alert('No valid lines found. Use the format:\nOption A | Option B'); return; }
  // Append to existing editor rows
  const list = document.getElementById('editor-list');
  const startIdx = list.querySelectorAll('.editor-row').length;
  qs.forEach((q, i) => {
    list.appendChild(makeEditorRow(q.a, q.b, startIdx + i));
  });
  renumberRows();
  list.scrollTop = list.scrollHeight;
  closeBatchImport();
  // Auto-save immediately so the game counter reflects the new total right away
  saveEditor(code);
  const msg = document.getElementById('saved-msg');
  if (msg) {
    msg.textContent = qs.length + ' questions added & saved!';
    msg.classList.add('show');
    setTimeout(() => { msg.classList.remove('show'); msg.textContent = 'Saved!'; }, 2800);
  }
}


function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/"/g, '&quot;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function startLevel(code) {
  currentLevel = code;
  currentIndex = getIndex(code);
  voted = false;
  document.getElementById('game-level-label').textContent = code + ' · ' + DEFAULT_LEVELS[code].name;
  showScreen('screen-game');
  loadQuestion(false);
}

function loadQuestion(animate) {
  const qs = getQuestionsForLevel(currentLevel);
  const q = qs[currentIndex];
  voted = false;
  document.getElementById('game-progress').textContent = (currentIndex + 1) + ' / ' + qs.length;
  document.getElementById('text-a').textContent = q.a;
  document.getElementById('text-b').textContent = q.b;
  const cardA = document.getElementById('card-a');
  const cardB = document.getElementById('card-b');
  cardA.className = 'choice-card';
  cardB.className = 'choice-card';
  cardA.onclick = () => vote('a');
  cardB.onclick = () => vote('b');
  document.querySelectorAll('.result-wrap').forEach(el => el.remove());
  document.getElementById('or-pill').style.opacity = '1';
  document.getElementById('game-footer').style.display = 'none';
  if (animate) {
    const wrap = document.getElementById('cards-wrap');
    wrap.classList.add('slide-in');
    wrap.addEventListener('animationend', () => wrap.classList.remove('slide-in'), { once: true });
  }
}

function vote(side) {
  if (voted) return;
  voted = true;
  const votes = getVotes(currentLevel);
  const qKey = 'q' + currentIndex;
  if (!votes[qKey]) votes[qKey] = { a: 0, b: 0 };
  votes[qKey][side]++;
  saveVotes(currentLevel, votes);
  const q = votes[qKey];
  const total = q.a + q.b;
  const pA = total ? Math.round((q.a / total) * 100) : 50;
  const pB = 100 - pA;
  const cardA = document.getElementById('card-a');
  const cardB = document.getElementById('card-b');
  cardA.onclick = null;
  cardB.onclick = null;
  if (side === 'a') { cardA.classList.add('chosen'); cardB.classList.add('faded'); }
  else              { cardB.classList.add('chosen'); cardA.classList.add('faded'); }
  document.getElementById('or-pill').style.opacity = '0';

  function injectResult(card, pct, count) {
    if (!showStats) return;
    const div = document.createElement('div');
    div.className = 'result-wrap';
    div.innerHTML =
      '<div class="result-pct">' + pct + '%</div>' +
      '<div class="result-bar-track"><div class="result-bar-fill" style="width:0%"></div></div>' +
      '<div class="result-count">' + count + ' ' + (count === 1 ? 'vote' : 'votes') + '</div>';
    card.appendChild(div);
    setTimeout(() => div.querySelector('.result-bar-fill').style.width = pct + '%', 50);
  }

  injectResult(cardA, pA, q.a);
  injectResult(cardB, pB, q.b);
  const footer = document.getElementById('game-footer');
  footer.style.display = 'flex';
  const tv = document.getElementById('total-votes');
  if (showStats) {
    tv.textContent = total + ' total ' + (total === 1 ? 'vote' : 'votes') + ' recorded';
  } else {
    tv.textContent = '';
  }
}

function nextQuestion() {
  const qs = getQuestionsForLevel(currentLevel);
  currentIndex = (currentIndex + 1) % qs.length;
  saveIndex(currentLevel, currentIndex);
  const wrap = document.getElementById('cards-wrap');
  wrap.classList.add('slide-out');
  wrap.addEventListener('animationend', () => {
    wrap.classList.remove('slide-out');
    loadQuestion(true);
  }, { once: true });
}

function goBack() {
  openEditorLevel = null;
  buildPicker();
  showScreen('screen-pick');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

buildPicker();
</script>
</body>
</html>
